<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#5b6b80"/>
    </marker>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#24d17e"/><stop offset="100%" stop-color="#37c6ff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1120" height="640" fill="#0c0f14"/>
  <text x="40" y="46" fill="#e7edf3" font-size="26" font-weight="700">CleanRoom — end-to-end workflow</text>
  <text x="40" y="72" fill="#8a97a8" font-size="14">Storage forensics on immutable backup snapshots — detect ransomware, pinpoint the last clean recovery point, compute blast radius.</text>

  <!-- STAGE 0: source / simulator -->
  <rect x="40" y="110" width="200" height="96" rx="12" fill="#151a22" stroke="#263040"/>
  <text x="60" y="140" fill="#37c6ff" font-size="13" font-weight="700">0 · SOURCE</text>
  <text x="60" y="164" fill="#e7edf3" font-size="13">Protected file set</text>
  <text x="60" y="184" fill="#8a97a8" font-size="12">(real dir, or the built-in</text>
  <text x="60" y="199" fill="#8a97a8" font-size="12">ransomware simulator)</text>

  <!-- STAGE 1: capture / immutable store -->
  <rect x="300" y="110" width="200" height="96" rx="12" fill="#151a22" stroke="#263040"/>
  <text x="320" y="140" fill="#37c6ff" font-size="13" font-weight="700">1 · CAPTURE</text>
  <text x="320" y="164" fill="#e7edf3" font-size="13">Immutable snapshots</text>
  <text x="320" y="184" fill="#8a97a8" font-size="12">per-file hash + sampled</text>
  <text x="320" y="199" fill="#8a97a8" font-size="12">entropy (append-only)</text>

  <!-- STAGE 2: diff -->
  <rect x="560" y="110" width="200" height="96" rx="12" fill="#151a22" stroke="#263040"/>
  <text x="580" y="140" fill="#37c6ff" font-size="13" font-weight="700">2 · DIFF</text>
  <text x="580" y="164" fill="#e7edf3" font-size="13">Snapshot deltas</text>
  <text x="580" y="184" fill="#8a97a8" font-size="12">added / modified / deleted</text>
  <text x="580" y="199" fill="#8a97a8" font-size="12">/ renamed / encrypt+rename</text>

  <!-- STAGE 3: features -->
  <rect x="820" y="110" width="220" height="96" rx="12" fill="#151a22" stroke="#263040"/>
  <text x="840" y="140" fill="#37c6ff" font-size="13" font-weight="700">3 · FEATURES</text>
  <text x="840" y="164" fill="#e7edf3" font-size="13">12-dim feature vector</text>
  <text x="840" y="184" fill="#8a97a8" font-size="12">entropy jump, velocity,</text>
  <text x="840" y="199" fill="#8a97a8" font-size="12">mass-op ratios, canaries…</text>

  <!-- arrows row 1 -->
  <line x1="240" y1="158" x2="298" y2="158" stroke="#5b6b80" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="158" x2="558" y2="158" stroke="#5b6b80" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="158" x2="818" y2="158" stroke="#5b6b80" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- down arrow to detection -->
  <line x1="930" y1="206" x2="930" y2="250" stroke="#5b6b80" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STAGE 4: detection ensemble -->
  <rect x="360" y="252" width="680" height="150" rx="12" fill="#12181f" stroke="#2a3547"/>
  <text x="380" y="280" fill="#24d17e" font-size="13" font-weight="700">4 · DETECTION ENSEMBLE  (two stages, fused)</text>

  <!-- heuristics -->
  <rect x="380" y="296" width="150" height="42" rx="8" fill="#1b222c" stroke="#263040"/>
  <text x="392" y="314" fill="#e7edf3" font-size="12" font-weight="600">Entropy spike</text>
  <text x="392" y="330" fill="#8a97a8" font-size="11">content stage</text>

  <rect x="540" y="296" width="150" height="42" rx="8" fill="#1b222c" stroke="#263040"/>
  <text x="552" y="314" fill="#e7edf3" font-size="12" font-weight="600">Mass ops</text>
  <text x="552" y="330" fill="#8a97a8" font-size="11">delete/modify/rename</text>

  <rect x="700" y="296" width="150" height="42" rx="8" fill="#1b222c" stroke="#263040"/>
  <text x="712" y="314" fill="#e7edf3" font-size="12" font-weight="600">Velocity (z-score)</text>
  <text x="712" y="330" fill="#8a97a8" font-size="11">metadata stage</text>

  <rect x="860" y="296" width="160" height="42" rx="8" fill="#1b222c" stroke="#263040"/>
  <text x="872" y="314" fill="#e7edf3" font-size="12" font-weight="600">Extension + Canary</text>
  <text x="872" y="330" fill="#8a97a8" font-size="11">markers &amp; decoys</text>

  <rect x="380" y="348" width="300" height="42" rx="8" fill="#14231d" stroke="#1f4a37"/>
  <text x="392" y="366" fill="#24d17e" font-size="12" font-weight="600">IsolationForest (ML anomaly)</text>
  <text x="392" y="382" fill="#8a97a8" font-size="11">trained on the clean baseline history</text>

  <rect x="700" y="348" width="320" height="42" rx="8" fill="#14231d" stroke="#1f4a37"/>
  <text x="712" y="366" fill="#24d17e" font-size="12" font-weight="600">Weighted Scorer → Verdict</text>
  <text x="712" y="382" fill="#8a97a8" font-size="11">CLEAN · SUSPICIOUS · COMPROMISED (+ evidence)</text>

  <!-- down arrow to recovery -->
  <line x1="700" y1="402" x2="700" y2="446" stroke="#5b6b80" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STAGE 5: recovery -->
  <rect x="360" y="448" width="680" height="96" rx="12" fill="#151a22" stroke="#263040"/>
  <text x="380" y="476" fill="#ff9f43" font-size="13" font-weight="700">5 · RECOVERY ANALYSIS  (the distinctly-Rubrik outcome)</text>
  <rect x="380" y="488" width="300" height="42" rx="8" fill="#1b222c" stroke="#263040"/>
  <text x="392" y="506" fill="#e7edf3" font-size="12" font-weight="600">Last clean recovery point</text>
  <text x="392" y="522" fill="#8a97a8" font-size="11">newest trusted snapshot before infection</text>
  <rect x="700" y="488" width="320" height="42" rx="8" fill="#1b222c" stroke="#263040"/>
  <text x="712" y="506" fill="#e7edf3" font-size="12" font-weight="600">Blast radius</text>
  <text x="712" y="522" fill="#8a97a8" font-size="11">files/bytes/snapshots impacted from infection on</text>

  <!-- output -->
  <line x1="360" y1="496" x2="300" y2="496" stroke="#5b6b80" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="40" y="448" width="240" height="96" rx="12" fill="#0f1a16" stroke="#1f4a37"/>
  <text x="60" y="476" fill="#24d17e" font-size="13" font-weight="700">6 · REPORT</text>
  <text x="60" y="500" fill="#e7edf3" font-size="13">CLI report · JSON</text>
  <text x="60" y="520" fill="#e7edf3" font-size="13">· web dashboard</text>

  <!-- baseline feedback note -->
  <text x="380" y="588" fill="#5b6b80" font-size="11.5">First N snapshots form the trusted baseline (learned "normal") for both the z-score statistics and the ML model.</text>
  <text x="380" y="606" fill="#5b6b80" font-size="11.5">No single signal can convict — verdicts come from the fused, explainable score, which is why stealthy/partial encryption is still caught.</text>
</svg>
